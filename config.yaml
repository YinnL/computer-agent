action:
  click_interval: 0.3
  confirm_dangerous: true
  mouse_duration: 0.5
  type_interval: 0.1
api:
  api_key: "your-api-key-here"
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  max_iterations: 20
  max_tokens: 4096
  model: "qwen3.5-plus"
  temperature: 0.7
logging:
  console: true
  file: "agent.log"
  level: "INFO"
screen:
  screenshot_interval: 1.0
  screenshot_quality: 90
  virtual_resolution: 1000